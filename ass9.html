html>
<head>
    <title>Image Sources Tutorial</title>
</head>
<body>

    <h1>Adding Images in HTML</h1>

    <h3>1. Image from External Website (URL)</h3>
    <img src="https://via.placeholder.com/200" alt="External Image">

    <h3>2. Image from Local Computer</h3>
    <img src="C:\Users\YourName\Pictures\image.jpg" alt="Local Image">

    <h3>3. Image from Project Folder</h3>
    <img src="image.jpg" alt="Project Folder Image">

</body>
</html>
