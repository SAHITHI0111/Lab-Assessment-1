<!DOCTYPE html>

    <title>Student Eligibility Rules</title>
</head>
<body>

    <section>
        <h2>Internal Assessment Eligibility</h2>
        
        <p>
            A student is eligible for internal assessment if their attendance is 
            greater than 75&#37;, the assignment count is less than 5, and the 
            internal score is less than or equal to 40.
        </p>
        
        <p>
            Conditions: Attendance &gt; 75&#37;, Assignment count &lt; 5, 
            Internal score &le; 40.
        </p>
    </section>

</body>
</html>
